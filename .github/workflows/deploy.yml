name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: ca-central-1
  ECR_REPO: ar-reports-scraper-production-main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn test

  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO:latest .
          docker push $ECR_REGISTRY/$ECR_REPO:latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Deploy with Serverless
        env:
          AUTH_USERNAME: ${{ secrets.AUTH_USERNAME }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
          GOOGLE_IMPERSONATE_EMAIL: ${{ vars.GOOGLE_IMPERSONATE_EMAIL }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          LOGIN_URL: ${{ vars.LOGIN_URL }}
          REPORT_FILENAME: ${{ vars.REPORT_FILENAME }}
          REPORT_FRIENDLY_NAME: ${{ vars.REPORT_FRIENDLY_NAME }}
          DRIVE_FOLDER_ID: ${{ vars.DRIVE_FOLDER_ID }}
          TO_EMAIL: ${{ vars.TO_EMAIL }}
          SUCCESS_CC_EMAILS: ${{ vars.SUCCESS_CC_EMAILS }}
          FAIL_CC_EMAILS: ${{ vars.FAIL_CC_EMAILS }}
        run: npx serverless deploy --stage production
